name: Deploy

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Read NODE_VERSION from wrangler.jsonc
        id: node
        run: echo "version=$(grep -o '"NODE_VERSION": "[^"]*"' wrangler.jsonc | head -1 | cut -d'"' -f4)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - run: npm ci

      - name: Build for production
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-dev:
    runs-on: ubuntu-latest
    if: contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-dev')
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Read NODE_VERSION from wrangler.jsonc
        id: node
        run: echo "version=$(grep -o '"NODE_VERSION": "[^"]*"' wrangler.jsonc | head -1 | cut -d'"' -f4)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - run: npm ci

      - name: Build for dev
        run: npx opennextjs-cloudflare build --env dev

      - name: Deploy to Cloudflare (dev)
        run: npx wrangler deploy --env dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
