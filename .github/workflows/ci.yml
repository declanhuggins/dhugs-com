name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read NODE_VERSION from wrangler.jsonc
        id: node
        run: |
          version=$(node -p "JSON.parse(require('fs').readFileSync('wrangler.jsonc','utf8').replace(/\/\/.*/g,''))?.vars?.NODE_VERSION")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
