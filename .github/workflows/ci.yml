name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read NODE_VERSION from wrangler.jsonc
        id: node
        run: |
          version=$(grep -m1 '"NODE_VERSION"' wrangler.jsonc | sed 's/.*: *"\([^"]*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npx vitest run tests/unit/ --passWithNoTests
